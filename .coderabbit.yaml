# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!flake.lock"
  path_instructions:
    - path: "**/*.nix"
      instructions: |
        Review for correctness, idiomatic style, and security:
        - When a module declares options, they must use correct types and
          defaults (most modules here have no options block — that is fine)
        - Formatting follows nixfmt-rfc-style conventions
        - No deprecated option paths
        - Use mkDefault/mkForce only where precedence must be explicit
        - Sensitive options (boot, networking, security.*) warrant extra scrutiny
    - path: "hosts/**"
      instructions: |
        Host files contain only host-specific overrides.
        Generic logic belongs in modules/ — flag anything that looks reusable.
    - path: "modules/**"
      instructions: |
        These are plain NixOS/home-manager modules composed by import, NOT a
        generic library (DECISIONS 001: minimal abstraction, no flake-parts).
        Do NOT request a typed `enable`/options interface or parameterised
        usernames for a module just because it sets config directly — most
        modules here intentionally have no options block.
        This is a single-user, three-host personal config: the user is `maudi`
        on every machine (DECISIONS 007) and per-feature groups (libvirtd,
        gamemode, etc.) are added by their own modules by design. Referencing
        `maudi` directly is the established convention, not a defect — do not
        flag it. Still flag genuinely reusable logic stuck in a host file and
        real correctness/security issues.
    - path: "lib/**"
      instructions: |
        Helper functions should be pure and minimal.
        Check for edge cases in argument handling.
    - path: "pkgs/**"
      instructions: |
        Scripts via writeShellApplication must pass shellcheck.
        Watch for unquoted variables and missing error handling.
chat:
  auto_reply: true
